<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"/>
    <style>small{color: red;}</style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class = "col-md-6">
                <h2 class=""text-center mb-4">Registration Form</h2>
                <form>
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text"
                        id="username"
                        class="form-control"
                        onkeyup="validateUsername()">
                        <small id="usernameError"></small>

                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>

                        <div class="input-group">
                            <input type="password"
                            id="password"
                            class="form-control"
                            placeholder="Enter Password"
                            onkeyup="validatePassword()">

                            <button type="button"
                            class="btn btn-success"
                            onclick="togglePassword(this)">
                        Show Password
                    </button>
                        </div>
                        <small id="passwordError"></small>
                    </div>
                    <div class ="mb-3">
                        <label class ="form-label">Mobile Number</label>
                        <input type="text"
                        id="mobile"
                        class="form-control"
                        onkeyup="validateMobile()">
                        <small id="mobileError"></small>
                    </div>

                    <div class ="mb-3">
                        <label class ="form-label">Email</label>
                        <input type="email"
                        id="email"
                        class="form-control"
                        onkeyup="validateEmail()">
                        <small id="emailError"></small>
                    </div>

                    <div class="mb-3"> 
                        <label class="form-label">Qualification</label>
                        <select id="qualification"
                        class="form-select"
                        onchange="validateQualification()">
                    <option value="0">Select Qualification</option>
                <option value="DR">Doctorate</option>
            <option value="PG">Post Graduate</option>
        <option value="GRA">Graduate</option>
    <option value="UG">Undergraduate</option>
</select>
<small id="qualificationError"></small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Gender</label>
                        <br>
                        <input type="radio"
                        name="gender"
                        id="rdFemale"
                        onchange="validateGender()">
                        <label for="rdFemale">Female</label>
                        &nbsp;&nbsp;
                        <input type = "radio"
                        name="gender"
                        id="rdMale"
                        onchange="validateGender()">
                        <label for="rdMale">Male</label>
                        <br>
                        <small id="genderError"></small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Upload PNG File</label>
                        <input type="file"
                        id="pic"
                        class="form-control"
                        onchange="validateFile()">
                        <small id="fileError"></small>
                    </div>
                    <button type="submit"
                    class="btn btn-success"
                    onclick="returnvalidateForm()">
                Sign Up</button>
                     
            
                </form>
            </div>
        </div>
    </div>
    <script src = "form.js"></script>
</body>
</html>
