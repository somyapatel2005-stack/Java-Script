<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop-Watch</title>
    <link rel = "Stylesheet" href = "stopwatch.css"/>
</head>
<body>
    <div class = stopWatch>
        <div class = timeDisplay> 00:00:00 </div>
    </div>
    <div class="buttons">
        <button id="stopBtn" class="BTN" style="--clr : pink">Stop Button</button>
        <button id="startBtn" class="BTN" style="--clr : beige">Start Button</button>
    <button id="resetBtn" class="BTN" style="--clr :  cyan">Reset Button</button>
    </div>
</body>
<script src="stopwatch.js"></script>
</html>
