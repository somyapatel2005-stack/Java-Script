<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop-Watch</title>
    <link rel = "Stylesheet" href = "stopWatch.css"/>
</head>
<body>
    <div class = "stopWatch">
        <div class = "timerDisplay"> 00:00:00 </div>
    </div>
    <div class="button">
        <button id="stopBtn" class="BTN1" style="--clr : pink">Stop</button>
        <button id="startBtn" class="BTN1" style="--clr : beige">Start</button>
    <button id="resetBtn" class="BTN1" style="--clr : white">Reset</button>
    </div>
</body>
<script src="stopWatch.js"></script>
</html>
